kind = "web"
previewPath = "/"
title = "Xito Tracker"
version = "1.0.0"
id = "artifacts/xito-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21120

[services.development]
run = "pnpm --filter @workspace/xito-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/xito-tracker", "run", "build" ]
publicDir = "artifacts/xito-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21120"
BASE_PATH = "/"
